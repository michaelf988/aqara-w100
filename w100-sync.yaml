blueprint:
  name: Aqara W100 Thermostat Synchronization
  description: |
    Synchronizes an Aqara W100 climate controller with a main thermostat entity.
    Supports bidirectional sync for HVAC mode, temperature, and fan mode.
    Optionally publishes external temperature and humidity data to the W100 display.
    Configure which HVAC modes and features your system supports.
  domain: automation
  
  input:
    main_thermostat:
      name: Main Thermostat
      description: The primary thermostat entity to sync with
      selector:
        entity:
          domain: climate
    aqara_w100:
      name: Aqara W100 Climate Controller
      description: The Aqara W100 climate entity
      selector:
        entity:
          domain: climate
    hvac_has_heat:
      name: Heating Support
      description: Enable if your HVAC system supports heating mode
      default: true
      selector:
        boolean:
    hvac_has_cool:
      name: Cooling Support
      description: Enable if your HVAC system supports cooling mode
      default: false
      selector:
        boolean:
    hvac_has_auto:
      name: Auto Mode Support
      description: Enable if your HVAC system supports automatic mode
      default: false
      selector:
        boolean:
    hvac_has_vent:
      name: Fan Mode Support
      description: Enable if your HVAC system supports fan mode control
      default: false
      selector:
        boolean:
    sync_delay:
      name: Synchronization Delay
      description: Delay between sync commands (in seconds)
      default: 2
      selector:
        number:
          min: 1
          max: 10
          step: 1
          unit_of_measurement: seconds
    enable_fanauto_switch:
      name: Enable Fan Auto Switch
      description: Enable if your main thermostat uses a separate switch for auto fan mode
      default: false
      selector:
        boolean:
    fanauto_switch:
      name: Fan Auto Switch
      description: Switch entity that enables auto fan mode on the main thermostat (e.g. switch.knx_klima_fanauto_penelope)
      default: []
      selector:
        entity:
          domain: switch
    enable_external_data:
      name: Enable External Data Publishing
      description: Publish external temperature and humidity to W100 display
      default: false
      selector:
        boolean:
    external_temperature_sensor:
      name: External Temperature Sensor
      description: Temperature sensor to publish to W100 (optional)
      default: []
      selector:
        entity:
          domain: sensor
          device_class: temperature
    external_humidity_sensor:
      name: External Humidity Sensor
      description: Humidity sensor to publish to W100 (optional)
      default: []
      selector:
        entity:
          domain: sensor
          device_class: humidity

variables:
  main_thermostat: !input main_thermostat
  aqara_w100: !input aqara_w100
  hvac_has_heat: !input hvac_has_heat
  hvac_has_cool: !input hvac_has_cool
  hvac_has_auto: !input hvac_has_auto
  hvac_has_vent: !input hvac_has_vent
  sync_delay: !input sync_delay
  enable_fanauto_switch: !input enable_fanauto_switch
  fanauto_switch: !input fanauto_switch
  enable_external_data: !input enable_external_data
  external_temperature_sensor: !input external_temperature_sensor
  external_humidity_sensor: !input external_humidity_sensor
  thermostat_mode_switch: >-
    {{ 'switch.' ~ aqara_w100.split('.')[1] ~ '_thermostat_mode' }}

triggers:
  - trigger: state
    entity_id: !input main_thermostat
    id: climate_state
  - trigger: state
    entity_id: !input aqara_w100
    id: w100_climate_state
  - trigger: state
    entity_id: !input fanauto_switch
    id: fanauto_state
    enabled: !input enable_fanauto_switch
  - trigger: state
    entity_id: !input external_temperature_sensor
    id: ext_temp
    enabled: !input enable_external_data
  - trigger: state
    entity_id: !input external_humidity_sensor
    id: ext_hum
    enabled: !input enable_external_data
  - trigger: template
    value_template: >-
      {{ is_state(thermostat_mode_switch, 'off') }}
    id: thermostat_mode_off

conditions: []

actions:
  - choose:
      - conditions:
          - condition: trigger
            id:
              - climate_state
          - condition: template
            value_template: >-
              {{ is_state(thermostat_mode_switch, 'on') }}
        sequence:
          - if:
              - condition: template
                value_template: >-
                  {{ states(main_thermostat) != states(aqara_w100) }}
              - condition: template
                value_template: >-
                  {{ is_state(thermostat_mode_switch, 'on') }}
            then:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input aqara_w100
                data:
                  hvac_mode: |
                    {{ states(main_thermostat) }}
              - delay:
                  seconds: "{{ sync_delay }}"
          - if:
              - condition: template
                value_template: >-
                  {% set t = state_attr(main_thermostat, "temperature") | float %}
                  {% set clamped = [state_attr(aqara_w100, 'min_temp'),
                    [state_attr(aqara_w100, 'max_temp'), t] | min] | max %}
                  {{ clamped != state_attr(aqara_w100, "temperature") }}
            then:
              - action: climate.set_temperature
                target:
                  entity_id: !input aqara_w100
                data:
                  temperature: |
                    {% set t = state_attr(main_thermostat, "temperature") | float %}
                    {{ [state_attr(aqara_w100, 'min_temp'),
                        [state_attr(aqara_w100, 'max_temp'), t] | min] | max }}
              - delay:
                  seconds: "{{ sync_delay }}"
          - if:
              - condition: template
                value_template: >-
                  {% if not (hvac_has_vent | default(false) | bool) %}
                    {{ false }}
                  {% else %}
                    {% set effective_source = 'auto' if (fanauto_switch != [] and is_state(fanauto_switch, 'on')) else state_attr(main_thermostat, 'fan_mode') %}
                    {% set target = state_attr(aqara_w100, 'fan_mode') %}
                    {% set source_norm = 'medium' if effective_source | lower == 'med' else effective_source | lower %}
                    {{ source_norm != target }}
                  {% endif %}
            then:
              - action: climate.set_fan_mode
                target:
                  entity_id: !input aqara_w100
                data:
                  fan_mode: |
                    {% set effective_source = 'auto' if (fanauto_switch != [] and is_state(fanauto_switch, 'on')) else state_attr(main_thermostat, 'fan_mode') %}
                    {% if effective_source | lower == 'med' or effective_source | lower == 'medium' %}
                      medium
                    {% else %}
                      {{ effective_source }}
                    {% endif %}
              - delay:
                  seconds: "{{ sync_delay }}"

      - conditions:
          - condition: trigger
            id:
              - w100_climate_state
          - condition: template
            value_template: >-
              {{ is_state(thermostat_mode_switch, 'on') }}
        sequence:
          - if:
              - condition: template
                value_template: |
                  {{
                    (states(main_thermostat) != states(aqara_w100)) and
                    (
                      (is_state(aqara_w100, 'heat') and (hvac_has_heat | default(false) | bool)) or
                      (is_state(aqara_w100, 'cool') and (hvac_has_cool | default(false) | bool)) or
                      (is_state(aqara_w100, 'auto') and (hvac_has_auto | default(false) | bool)) or
                      (is_state(aqara_w100, 'off'))
                    )
                  }}
            then:
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: |
                    {{ states(aqara_w100) }}
                target:
                  entity_id: !input main_thermostat
              - delay:
                  seconds: "{{ sync_delay }}"
            else:
              - if:
                  - condition: template
                    value_template: |
                      {{
                        (is_state(aqara_w100, 'heat') and not (hvac_has_heat | default(false) | bool)) or
                        (is_state(aqara_w100, 'cool') and not (hvac_has_cool | default(false) | bool)) or
                        (is_state(aqara_w100, 'auto') and not (hvac_has_auto | default(false) | bool))
                      }}
                then:
                  - action: climate.set_hvac_mode
                    metadata: {}
                    data:
                      hvac_mode: heat
                    target:
                      entity_id: !input aqara_w100
                  - delay:
                      seconds: "{{ sync_delay }}"
          - if:
              - condition: template
                value_template: >-
                  {{ state_attr(main_thermostat, "temperature") !=
                  state_attr(aqara_w100, "temperature") }}
            then:
              - action: climate.set_temperature
                data:
                  temperature: |
                    {{ state_attr(aqara_w100, "temperature") }}
                target:
                  entity_id: !input main_thermostat
              - delay:
                  seconds: "{{ sync_delay }}"
          - if:
              - condition: template
                value_template: "{{ hvac_has_vent | default(false) | bool }}"
            then:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: >-
                          {{ is_state_attr(aqara_w100, 'fan_mode', 'auto') }}
                    sequence:
                      - if:
                          - condition: template
                            value_template: >-
                              {{ fanauto_switch != [] and is_state(fanauto_switch, 'off') }}
                        then:
                          - action: switch.turn_on
                            target:
                              entity_id: "{{ fanauto_switch }}"
                          - delay:
                              seconds: "{{ sync_delay }}"
                default:
                  - if:
                      - condition: template
                        value_template: >-
                          {{ fanauto_switch != [] and is_state(fanauto_switch, 'on') }}
                    then:
                      - action: switch.turn_off
                        target:
                          entity_id: "{{ fanauto_switch }}"
                      - delay:
                          seconds: "{{ sync_delay }}"
                  - if:
                      - condition: template
                        value_template: >-
                          {% set source = state_attr(aqara_w100, "fan_mode") %}
                          {% set target = state_attr(main_thermostat, "fan_mode") %}
                          {% set source_norm = 'medium' if source | lower == 'med' else source | lower %}
                          {{ source_norm != target }}
                    then:
                      - action: climate.set_fan_mode
                        target:
                          entity_id: !input main_thermostat
                        data:
                          fan_mode: |
                            {% set source = state_attr(aqara_w100, "fan_mode") %}
                            {% set target_valid_list = state_attr(main_thermostat, "fan_modes") %}
                            {% if source | lower == 'med' or source | lower == 'medium' %}
                              {{ target_valid_list | select('search', '(?i)^med') | first | default(source) }}
                            {% else %}
                              {{ source }}
                            {% endif %}
                      - delay:
                          seconds: "{{ sync_delay }}"

      - conditions:
          - condition: trigger
            id:
              - fanauto_state
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(fanauto_switch, 'on') }}"
                sequence:
                  - if:
                      - condition: template
                        value_template: >-
                          {{ not is_state_attr(aqara_w100, 'fan_mode', 'auto') }}
                    then:
                      - action: climate.set_fan_mode
                        target:
                          entity_id: !input aqara_w100
                        data:
                          fan_mode: auto
                      - delay:
                          seconds: "{{ sync_delay }}"
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(fanauto_switch, 'off') }}"
                sequence:
                  - if:
                      - condition: template
                        value_template: >-
                          {% set knx_fan = state_attr(main_thermostat, 'fan_mode') %}
                          {% set aqara_valid = state_attr(aqara_w100, 'fan_modes') %}
                          {{ knx_fan in aqara_valid and not is_state_attr(aqara_w100, 'fan_mode', knx_fan) }}
                    then:
                      - action: climate.set_fan_mode
                        target:
                          entity_id: !input aqara_w100
                        data:
                          fan_mode: |
                            {{ state_attr(main_thermostat, 'fan_mode') }}
                      - delay:
                          seconds: "{{ sync_delay }}"

      - conditions:
          - condition: trigger
            id:
              - thermostat_mode_off
        sequence:
          - action: climate.turn_off
            target:
              entity_id: !input main_thermostat

      - conditions:
          - condition: trigger
            id:
              - ext_temp
              - ext_hum
          - condition: template
            value_template: "{{ enable_external_data }}"
        sequence:
          - if:
              - condition: template
                value_template: >-
                  {{ external_temperature_sensor != [] and states(external_temperature_sensor) not in ['unknown', 'unavailable'] }}
            then:
              - action: number.set_value
                target:
                  entity_id: >-
                    {{ 'number.' ~ aqara_w100.split('.')[1] ~ '_external_temperature' }}
                data:
                  value: |
                    {{ states(external_temperature_sensor) | float }}
              - delay:
                  seconds: "{{ sync_delay }}"
          - if:
              - condition: template
                value_template: >-
                  {{ external_humidity_sensor != [] and states(external_humidity_sensor) not in ['unknown', 'unavailable'] }}
            then:
              - action: number.set_value
                target:
                  entity_id: >-
                    {{ 'number.' ~ aqara_w100.split('.')[1] ~ '_external_humidity' }}
                data:
                  value: |
                    {{ states(external_humidity_sensor) | float }}
              - delay:
                  seconds: "{{ sync_delay }}"

mode: queued
max: 10
